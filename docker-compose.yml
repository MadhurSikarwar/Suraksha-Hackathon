version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      # Override these with real values via .env file or CI/CD secrets
      - AUDIT_DB_PATH=/app/data/audit_logs.db
    volumes:
      # Persist heatmaps and audit DB across container restarts
      - ./backend/static:/app/static
      - suraksha_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  suraksha_data:
    driver: local
